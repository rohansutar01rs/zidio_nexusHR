version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: nexushr-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexushr
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nexushr-network

  redis:
    image: redis:7-alpine
    container_name: nexushr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexushr-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  nexushr-network:
    driver: bridge
