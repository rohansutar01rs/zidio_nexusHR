server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: employee-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/employees/**, /api/departments/**, /api/attendance/**, /api/leaves/**, /api/performance/**, /api/ai-insights/**
        - id: payroll-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payroll/**, /api/payslips/**
