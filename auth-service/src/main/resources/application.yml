server:
  port: 8081
  servlet:
    context-path: /api/auth

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:nexushr_auth;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 3600000 # 1 hour in ms
  refresh-expiration: 604800000 # 7 days in ms
